[pytest]
# Specify the Django settings module for running tests
DJANGO_SETTINGS_MODULE = config.settings

# Match patterns for test discovery files
python_files = test_*.py

# Additional command-line options: disable migrations for speed, reuse test DB, quiet output
addopts = --nomigrations --reuse-db -q

# Define python search path for relative imports
pythonpath = .

# Environment variables injected during pytest execution
env =
    DEBUG=False
    TESTING=True
    postgresql=False
    SECRET_KEY=django-insecure-test-key-only-for-pytest-1234567890abcdef